<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>مع المسيح كل يوم | آية يومية</title>
    
    <link rel="manifest" href="https://progressier.app/IcEp6UoPmEERGL82fB9q/progressier.json"/>
    <script defer src="https://progressier.app/IcEp6UoPmEERGL82fB9q/script.js"></script>
    
    <meta name="theme-color" content="#d4af37">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2903/2903510.png">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: linear-gradient(135deg, #0f0c1e 0%, #1a0f2e 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px; color: #f0e6d0;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 40px;
            padding: 45px 25px;
            text-align: center;
            max-width: 420px; width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .cross { font-size: 65px; color: #d4af37; margin-bottom: 15px; display: block; }
        h1 { color: #d4af37; margin-bottom: 25px; font-size: 1.9rem; }
        .verse-box {
            background: rgba(0,0,0,0.3);
            padding: 25px; border-radius: 25px;
            border-right: 5px solid #d4af37; margin-bottom: 30px;
        }
        .verse-text { font-size: 1.4rem; line-height: 1.7; font-weight: 500; }
        .btn-install {
            background: linear-gradient(135deg, #d4af37, #b8942e);
            color: #0f0c1e; border: none; padding: 18px;
            border-radius: 50px; width: 100%; font-weight: bold;
            font-size: 1.1rem; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }
        .btn-install:active { transform: scale(0.97); }
    </style>
</head>
<body>

<div class="card">
    <span class="cross">✝</span>
    <h1>مع المسيح كل يوم</h1>
    <div class="verse-box">
        <div class="verse-text">"لَا تَخَفْ، لِأَنِّي مَعَكَ. لَا تَتَلَفَّتْ، لِأَنِّي إِلَهُكَ"</div>
        <div style="color:#d4af37; margin-top:12px; font-size:0.9rem;">(إشعياء 41:10)</div>
    </div>
    
    <button class="btn-install" onclick="window.progressier.showInstallationPrompt()">📥 تثبيت التطبيق على الموبايل</button>
    
    <p style="margin-top:20px; font-size:0.8rem; opacity:0.6;">ستصلك الإشعارات اليومية بعد التثبيت 🔔</p>
</div>

</body>
</html>
