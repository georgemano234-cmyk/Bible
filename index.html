<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مع المسيح كل يوم</title>
    
    <script src="https://progressier.app/IcEp6UoPmEERGL82fB9q/script.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* خلفية سوداء فخمة */
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        /* تصميم الصليب المنبثق */
        .floating-cross {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 30px;
            color: #FFD700; /* لون ذهبي */
            filter: drop-shadow(0 0 5px #FFD700);
            z-index: 1000;
        }
        .verse-container {
            padding: 20px;
            border: 1px solid #FFD700;
            border-radius: 15px;
            background: rgba(255, 215, 0, 0.1);
        }
    </style>
</head>
<body>

    <div class="floating-cross">✝</div>

    <div class="verse-container">
        <h1 id="time">00:00:00</h1>
        <p id="daily-verse">جاري تحميل آية اليوم...</p>
    </div>

    <script>
        // دالة لضبط الوقت بتوقيت القاهرة
        function updateTime() {
            const now = new Date();
            const options = { timeZone: 'Africa/Cairo', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
            const timeString = now.toLocaleTimeString('ar-EG', options);
            document.getElementById('time').innerText = timeString;
        }

        // تحديث الوقت كل ثانية
        setInterval(updateTime, 1000);
        updateTime();

        // آية اليوم (تتغير حسب اليوم)
        const verses = [
            "أَسْتَطِيعُ كُلَّ شَيْءٍ فِي الْمَسِيحِ الَّذِي يُقَوِّينِي.",
            "اَللهُ مَحَبَّةٌ.",
            "تَعَالَوْا إِلَيَّ يَا جَمِيعَ الْمُتْعَبِينَ وَالثَّقِيلِي الأَحْمَالِ، وَأَنَا أُرِيحُكُمْ."
        ];
        const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / (1000 * 60 * 60 * 24));
        document.getElementById('daily-verse').innerText = verses[dayOfYear % verses.length];
    </script>
</body>
</html>
